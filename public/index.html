<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Korting Scanner</title>
  <link rel="stylesheet" href="/css/variables.css">
  <link rel="stylesheet" href="/css/reset.css">
  <link rel="stylesheet" href="/css/layout.css">
  <link rel="stylesheet" href="/css/components.css">
</head>
<body>
  <div class="app">
    <header class="app-header">
      <h1>Korting Scanner</h1>
      <div class="header-actions">
        <button class="btn-icon refresh-btn" id="refresh-btn" title="Ververs">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="23 4 23 10 17 10"></polyline>
            <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
          </svg>
        </button>
      </div>
    </header>

    <nav class="tab-bar">
      <button class="tab-btn active" data-tab="on-sale">In de Bonus</button>
      <button class="tab-btn" data-tab="my-products">Mijn Producten</button>
    </nav>

    <main class="tab-content">
      <section class="tab-panel active" id="panel-on-sale"></section>
      <section class="tab-panel" id="panel-my-products"></section>
    </main>
  </div>

  <div class="toast-container" id="toast-container"></div>

  <script type="module" src="/js/app.js"></script>
</body>
</html>
